---
repos:
  - repo: local
    hooks:
      - id: yamllint-ansible
        name: yamllint (ansible/)
        language: system
        entry: yamllint
        pass_filenames: true
        files: ^ansible/.*\.(yml|yaml)$

      - id: ansible-inventory-validate
        name: ansible-inventory validate (ansible/example)
        language: system
        entry: >-
          bash -c 'ansible-inventory -i ansible/inventories/example/inventory.yml
          --list >/dev/null'
        pass_filenames: false
