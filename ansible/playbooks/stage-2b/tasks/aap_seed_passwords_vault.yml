---
- name: Assert AAP Vault seed settings
  ansible.builtin.assert:
    that:
      - aap_password_seed_vault_addr | default('', true) | trim | length > 0
      - aap_password_seed_vault_token | default('', true) | trim | length > 0
      - aap_password_seed_vault_kv_mount | default('', true) | trim | length > 0
      - aap_password_seed_vault_kv_path | default('', true) | trim | length > 0
      - aap_defaults_seed_vault_kv_path | default('', true) | trim | length > 0
    fail_msg: >-
      AAP Vault seed requires aap_password_seed_vault_addr,
      aap_password_seed_vault_token, aap_password_seed_vault_kv_mount,
      aap_password_seed_vault_kv_path, and aap_defaults_seed_vault_kv_path.
    quiet: true
  no_log: "{{ aap_admin_passwords_no_log | default(true) }}"

- name: Read AAP admin passwords from Vault KV2
  delegate_to: localhost
  become: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  community.hashi_vault.vault_kv2_get:
    url: "{{ aap_password_seed_vault_addr }}"
    validate_certs: "{{ aap_password_seed_vault_validate_certs | default(false) | bool }}"
    engine_mount_point: "{{ aap_password_seed_vault_kv_mount }}"
    path: "{{ aap_password_seed_vault_kv_path }}"
    token: "{{ aap_password_seed_vault_token }}"
  register: aap_password_seed_vault_read
  failed_when: false
  no_log: "{{ aap_admin_passwords_no_log | default(true) }}"

- name: Fail when AAP Vault read failed for non-missing-secret reasons
  ansible.builtin.assert:
    that:
      - not (_aap_seed_read_failed | bool) or (_aap_seed_read_missing | bool)
    fail_msg: >-
      Failed reading AAP admin passwords from Vault path
      {{ aap_password_seed_vault_kv_mount }}/data/{{ aap_password_seed_vault_kv_path }}:
      {{ _aap_seed_read_msg }}.
    quiet: true
  vars:
    _aap_seed_read_has_payload: >-
      {{
        (aap_password_seed_vault_read.raw is defined)
        or (aap_password_seed_vault_read.secret is defined)
        or (
          aap_password_seed_vault_read.data is defined
          and aap_password_seed_vault_read.data.data is defined
        )
      }}
    _aap_seed_read_failed: >-
      {{
        (aap_password_seed_vault_read.failed | default(false) | bool)
        or (
          not (_aap_seed_read_has_payload | bool)
          and (_aap_seed_read_msg | trim | length > 0)
        )
      }}
    _aap_seed_read_msg: "{{ aap_password_seed_vault_read.msg | default('unknown Vault read error') | string }}"
    _aap_seed_read_missing: >-
      {{
        ("doesn't seem to exist" in (_aap_seed_read_msg | lower))
        or ('status code was 404' in (_aap_seed_read_msg | lower))
        or ('404 client error' in (_aap_seed_read_msg | lower))
        or ('invalid or missing path' in (_aap_seed_read_msg | lower))
        or ('missing path' in (_aap_seed_read_msg | lower))
      }}

- name: Read RH offline token from Vault KV2 defaults path
  delegate_to: localhost
  become: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  community.hashi_vault.vault_kv2_get:
    url: "{{ aap_password_seed_vault_addr }}"
    validate_certs: "{{ aap_password_seed_vault_validate_certs | default(false) | bool }}"
    engine_mount_point: "{{ aap_password_seed_vault_kv_mount }}"
    path: "{{ aap_defaults_seed_vault_kv_path }}"
    token: "{{ aap_password_seed_vault_token }}"
  register: aap_defaults_seed_vault_read
  failed_when: false
  no_log: "{{ aap_admin_passwords_no_log | default(true) }}"

- name: Fail when RH offline token Vault read failed for non-missing-secret reasons
  ansible.builtin.assert:
    that:
      - not (_aap_defaults_read_failed | bool) or (_aap_defaults_read_missing | bool)
    fail_msg: >-
      Failed reading RH offline token from Vault path
      {{ aap_password_seed_vault_kv_mount }}/data/{{ aap_defaults_seed_vault_kv_path }}:
      {{ _aap_defaults_read_msg }}.
    quiet: true
  vars:
    _aap_defaults_read_has_payload: >-
      {{
        (aap_defaults_seed_vault_read.raw is defined)
        or (aap_defaults_seed_vault_read.secret is defined)
        or (
          aap_defaults_seed_vault_read.data is defined
          and aap_defaults_seed_vault_read.data.data is defined
        )
      }}
    _aap_defaults_read_failed: >-
      {{
        (aap_defaults_seed_vault_read.failed | default(false) | bool)
        or (
          not (_aap_defaults_read_has_payload | bool)
          and (_aap_defaults_read_msg | trim | length > 0)
        )
      }}
    _aap_defaults_read_msg: "{{ aap_defaults_seed_vault_read.msg | default('unknown Vault read error') | string }}"
    _aap_defaults_read_missing: >-
      {{
        ("doesn't seem to exist" in (_aap_defaults_read_msg | lower))
        or ('status code was 404' in (_aap_defaults_read_msg | lower))
        or ('404 client error' in (_aap_defaults_read_msg | lower))
        or ('invalid or missing path' in (_aap_defaults_read_msg | lower))
        or ('missing path' in (_aap_defaults_read_msg | lower))
      }}
  no_log: "{{ aap_admin_passwords_no_log | default(true) }}"

- name: Initialize AAP password seed state
  ansible.builtin.set_fact:
    aap_password_seed_existing: "{{ _aap_password_seed_secret }}"
    aap_password_seed_effective: {}
    aap_password_seed_missing_keys: []
    aap_rh_offline_token_vault_keys_checked: "{{ _aap_rh_offline_token_keys_checked }}"
    aap_rh_offline_token_source_key: "{{ _aap_rh_offline_token_source_key }}"
    aap_rh_offline_token_effective: >-
      {{
        (
          rh_offline_token
          | default('', true)
          | string
          | trim
        )
        if (
          rh_offline_token
          | default('', true)
          | string
          | trim
          | length > 0
        )
        else (
          (
            _aap_defaults_seed_secret.get(_aap_rh_offline_token_primary_key, '')
            | string
            | trim
          )
          if (
            _aap_defaults_seed_secret.get(_aap_rh_offline_token_primary_key, '')
            | string
            | trim
            | length > 0
          )
          else (
            (
              _aap_defaults_seed_secret.get('offline_token', '')
              | string
              | trim
            )
            if (
              _aap_defaults_seed_secret.get('offline_token', '')
              | string
              | trim
              | length > 0
            )
            else (
              (
                _aap_defaults_seed_secret.get('token', '')
                | string
                | trim
              )
              if (
                _aap_defaults_seed_secret.get('token', '')
                | string
                | trim
                | length > 0
              )
              else (
                _aap_defaults_seed_secret.get('RH_AUTOMATION_HUB_TOKEN', '')
                | string
                | trim
              )
            )
          )
        ) | string | trim
      }}
  vars:
    _aap_password_seed_secret: >-
      {{
        aap_password_seed_vault_read.secret
        | default(aap_password_seed_vault_read.data.data | default({}), true)
      }}
    _aap_defaults_seed_secret: >-
      {{
        aap_defaults_seed_vault_read.secret
        | default(aap_defaults_seed_vault_read.data.data | default({}), true)
      }}
    _aap_rh_offline_token_primary_key: >-
      {{
        aap_password_seed_rh_offline_token_key
        | default('rh_offline_token', true)
        | string
        | trim
      }}
    _aap_rh_offline_token_keys_checked: >-
      {{
        [
          _aap_rh_offline_token_primary_key,
          'offline_token',
          'token',
          'RH_AUTOMATION_HUB_TOKEN'
        ] | unique
      }}
    _aap_rh_offline_token_source_key: >-
      {{
        'inventory.rh_offline_token'
        if (
          rh_offline_token
          | default('', true)
          | string
          | trim
          | length > 0
        )
        else (
          _aap_rh_offline_token_primary_key
          if (
            _aap_defaults_seed_secret.get(_aap_rh_offline_token_primary_key, '')
            | string
            | trim
            | length > 0
          )
          else (
            'offline_token'
            if (
              _aap_defaults_seed_secret.get('offline_token', '')
              | string
              | trim
              | length > 0
            )
            else (
              'token'
              if (
                _aap_defaults_seed_secret.get('token', '')
                | string
                | trim
                | length > 0
              )
              else (
                'RH_AUTOMATION_HUB_TOKEN'
                if (
                  _aap_defaults_seed_secret.get('RH_AUTOMATION_HUB_TOKEN', '')
                  | string
                  | trim
                  | length > 0
                )
                else ''
              )
            )
          )
        )
      }}
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log | default(true) }}"

- name: Assert RH offline token is available for AAP bundle download
  ansible.builtin.assert:
    that:
      - aap_rh_offline_token_effective | default('', true) | trim | length > 0
    fail_msg: >-
      Missing RH offline token for AAP download flow.
      Provide rh_offline_token in inventory or store one of the keys
      {{ aap_rh_offline_token_vault_keys_checked | default(['rh_offline_token'], true) | join(', ') }}
      in Vault path {{ aap_password_seed_vault_kv_mount }}/data/{{ aap_defaults_seed_vault_kv_path }}.
      Available keys at that path:
      {{ _aap_defaults_available_keys | join(', ') if (_aap_defaults_available_keys | length > 0) else '[none]' }}.
    quiet: true
  vars:
    _aap_defaults_available_keys: >-
      {{
        (
          aap_defaults_seed_vault_read.secret
          | default(aap_defaults_seed_vault_read.data.data | default({}), true)
          | dict2items
          | map(attribute='key')
          | list
          | sort
        )
      }}
  when:
    - aap_deploy_manage_download_unpack | default(true) | bool
  no_log: "{{ aap_admin_passwords_no_log | default(true) }}"

- name: Resolve AAP password values from Vault payload
  ansible.builtin.set_fact:
    aap_password_seed_effective: "{{ aap_password_seed_effective | combine({ item: _value }) }}"
    aap_password_seed_missing_keys: >-
      {{
        aap_password_seed_missing_keys
        + (([item] if (_value | length == 0) else []))
      }}
  vars:
    _value: "{{ aap_password_seed_existing.get(item, '') | string | trim }}"
  loop:
    - gateway_admin_password
    - controller_admin_password
    - hub_admin_password
    - eda_admin_password
    - postgresql_admin_password
    - breakglass_password
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log | default(true) }}"

- name: Fail when AAP Vault passwords are missing and auto-create is disabled
  ansible.builtin.assert:
    that:
      - aap_password_seed_missing_keys | length == 0
    fail_msg: >-
      Missing AAP admin passwords in Vault path
      {{ aap_password_seed_vault_kv_mount }}/data/{{ aap_password_seed_vault_kv_path }}:
      {{ aap_password_seed_missing_keys | join(', ') }}.
      Enable aap_password_seed_get_or_create=true to create them automatically.
    quiet: true
  when: not (aap_password_seed_get_or_create | default(false) | bool)
  no_log: "{{ aap_admin_passwords_no_log | default(true) }}"

- name: Generate missing AAP admin passwords
  ansible.builtin.set_fact:
    aap_password_seed_effective: >-
      {{
        aap_password_seed_effective
        | combine({
            item: lookup(
              'password',
              '/dev/null',
              length=(aap_password_seed_generated_length | default(32) | int),
              chars=(aap_password_seed_generated_chars | default('ascii_letters,digits'))
            )
          })
      }}
  loop: "{{ aap_password_seed_missing_keys }}"
  changed_when: false
  when:
    - aap_password_seed_get_or_create | default(false) | bool
    - aap_password_seed_missing_keys | length > 0
  no_log: "{{ aap_admin_passwords_no_log | default(true) }}"

- name: Persist generated AAP admin passwords to Vault KV2
  delegate_to: localhost
  become: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  community.hashi_vault.vault_kv2_write:
    url: "{{ aap_password_seed_vault_addr }}"
    validate_certs: "{{ aap_password_seed_vault_validate_certs | default(false) | bool }}"
    engine_mount_point: "{{ aap_password_seed_vault_kv_mount }}"
    path: "{{ aap_password_seed_vault_kv_path }}"
    token: "{{ aap_password_seed_vault_token }}"
    data: "{{ aap_password_seed_existing | combine(aap_password_seed_effective, recursive=True) }}"
  when:
    - aap_password_seed_get_or_create | default(false) | bool
    - aap_password_seed_missing_keys | length > 0
  no_log: "{{ aap_admin_passwords_no_log | default(true) }}"

- name: Assert AAP password seed produced required values
  ansible.builtin.assert:
    that:
      - aap_password_seed_effective.gateway_admin_password | default('', true) | trim | length > 0
      - aap_password_seed_effective.controller_admin_password | default('', true) | trim | length > 0
      - aap_password_seed_effective.hub_admin_password | default('', true) | trim | length > 0
      - aap_password_seed_effective.eda_admin_password | default('', true) | trim | length > 0
      - aap_password_seed_effective.postgresql_admin_password | default('', true) | trim | length > 0
      - aap_password_seed_effective.breakglass_password | default('', true) | trim | length > 0
    fail_msg: >-
      Failed to resolve AAP admin passwords from Vault seed flow.
    quiet: true
  no_log: "{{ aap_admin_passwords_no_log | default(true) }}"

- name: Publish AAP password inputs from Vault seed flow
  ansible.builtin.set_fact:
    aap_gateway_admin_password_input: "{{ aap_password_seed_effective.gateway_admin_password }}"
    aap_controller_admin_password_input: "{{ aap_password_seed_effective.controller_admin_password }}"
    aap_hub_admin_password_input: "{{ aap_password_seed_effective.hub_admin_password }}"
    aap_eda_admin_password_input: "{{ aap_password_seed_effective.eda_admin_password }}"
    aap_postgresql_admin_password_input: "{{ aap_password_seed_effective.postgresql_admin_password }}"
    aap_breakglass_password_input: "{{ aap_password_seed_effective.breakglass_password }}"
    aap_admin_password_input: "{{ aap_password_seed_effective.gateway_admin_password }}"
    rh_offline_token: "{{ aap_rh_offline_token_effective }}"
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log | default(true) }}"
