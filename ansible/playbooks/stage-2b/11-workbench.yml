---
# -----------------------------------------------------------------------------
# Workbenches - GUI + RDP
#
# Purpose:
# - Install a GUI stack (GNOME or XFCE) via lit.rhel.gui
# - Enable RDP access via XRDP (lit.rhel.xrdp) for remote administration
#
# Notes:
# - Select GUI via vars: `gui_variant: gnome|xfce` (default: gnome)
# - Control XRDP via vars: `xrdp_firewalld_zone`, `xrdp_listen_port`, TLS options, etc.
# -----------------------------------------------------------------------------

- name: Configure workbenches
  hosts: workbenches
  become: true
  gather_facts: true

  roles:
    - role: lit.rhel.developer_tools
      tags: [packages, developer_tools]

    - role: lit.rhel.vscode_deploy
      tags: [packages, vscode, vscode_deploy]

    - role: lit.rhel.vscode_config
      tags: [vscode, vscode_config]

    # GUI stack (GNOME or XFCE)
    - role: lit.rhel.gui
      tags: [gui]

    # XRDP server (RDP)
    - role: lit.rhel.xrdp
      tags: [xrdp]
