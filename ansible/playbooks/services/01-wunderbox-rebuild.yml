---
# Purpose:
# - Orchestrate a full Wunderbox rebuild pipeline:
#   1) Destroy VM
#   2) Provision VM
#   3) Apply base OS setup
#   4) Apply Wunderbox service configuration
#
# Usage:
# ansible-navigator run playbooks/services/01-wunderbox-rebuild.yml \
#   -i inventories/example/inventory.yml --limit wunderbox01.prd.dmz.corp.l-it.io

- import_playbook: ../stage-1/infrastructure-platform-vsphere/90-vm-destroy.yml
- import_playbook: 10-wunderbox-vmware-provision.yml
- import_playbook: 11-wunderbox-os-base.yml
- import_playbook: 12-wunderbox-service-stack.yml
